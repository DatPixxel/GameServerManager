<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Anmelden · Game Server Manager</title>
<style>
  :root{--ground:#0d1015;--surface:#151a21;--surface-2:#1b212b;--border:#28313d;
    --text:#e9edf3;--muted:#98a2b1;--faint:#5f6b7a;--accent:#4c9aff;--accent-2:#7db4ff;--accent-weak:#16233a;
    --crit:#e5574e;--crit-bg:#2e1618;--font:system-ui,"Segoe UI",Roboto,sans-serif;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 24px 60px -24px rgba(0,0,0,.7)}
  @media(prefers-color-scheme:light){:root{--ground:#eef1f6;--surface:#fff;--surface-2:#f4f7fb;--border:#dce3ec;--text:#141a22;--muted:#586373;--faint:#8b96a5;--accent:#2f7be8;--accent-weak:#dceafc;--crit:#cc3b33;--crit-bg:#fadedc;--shadow:0 1px 2px rgba(20,30,45,.06),0 24px 60px -28px rgba(20,30,45,.3)}}
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:
      radial-gradient(1200px 500px at 50% -10%,color-mix(in srgb,var(--accent) 14%,transparent),transparent),
      var(--ground);
    color:var(--text);font-family:var(--font);display:grid;place-items:center;padding:24px;-webkit-font-smoothing:antialiased}
  .box{width:min(400px,94vw);background:var(--surface);border:1px solid var(--border);border-radius:18px;
    box-shadow:var(--shadow);padding:34px 30px 30px;animation:pop .35s cubic-bezier(.2,.8,.3,1)}
  @keyframes pop{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .logo{width:52px;height:52px;border-radius:15px;display:grid;place-items:center;font-weight:800;font-size:24px;color:#fff;
    background:linear-gradient(150deg,var(--accent),var(--accent-2));box-shadow:0 10px 22px -8px var(--accent-weak);margin-bottom:18px}
  h1{font-size:21px;letter-spacing:-.02em}
  p.sub{color:var(--faint);font-size:13px;margin-top:5px;margin-bottom:22px}
  label{display:block;font-size:11.5px;font-weight:650;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:7px}
  input{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:12px 14px;
    color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
  input:focus{border-color:var(--accent)}
  button{width:100%;margin-top:16px;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:12px;
    font-size:14px;font-weight:650;font-family:inherit;cursor:pointer;transition:filter .15s,transform .08s}
  button:hover{filter:brightness(1.08)}button:active{transform:translateY(1px)}
  .err{background:var(--crit-bg);color:var(--crit);border:1px solid color-mix(in srgb,var(--crit) 40%,transparent);
    border-radius:9px;padding:10px 13px;font-size:13px;font-weight:600;margin-bottom:16px}
  .foot{text-align:center;color:var(--faint);font-size:11.5px;margin-top:20px}
</style>
</head>
<body>
  <form class="box" method="POST" action="/login">
    <div class="logo">G</div>
    <h1>Willkommen zurück</h1>
    <p class="sub">Melde dich am Game Server Manager an.</p>
    <!--ERROR-->
    <label for="pw">Passwort</label>
    <input id="pw" name="password" type="password" autofocus placeholder="••••••••" autocomplete="current-password">
    <button type="submit">Anmelden</button>
    <div class="foot">Läuft lokal auf diesem Rechner</div>
  </form>
</body>
</html>
